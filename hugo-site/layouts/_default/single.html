{{ define "main" }}
<div class="breadcrumb">
    <a href="{{ "/" | absURL }}">🏠 হোম</a> > 
    {{ range .Params.categories }}
    <a href="{{ printf "/categories/%s/" . | absURL }}">{{ . | humanize }}</a> > 
    {{ end }}
    {{ .Title }}
</div>

<article class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta" style="margin-bottom: 20px;">
        প্রকাশিত: {{ .PublishDate.Format "January 2, 2006" }} | পড়তে সময়: {{ .ReadingTime }} মিনিট
    </div>

    <div class="post-content">
        {{ .Content }}
    </div>
</article>

<div style="margin-top: 30px;">
    <a href="javascript:history.back()" style="font-weight: bold;">← পেছনে যান</a>
</div>
{{ end }}
