{{ define "main" }}
<div class="breadcrumb">
    <a href="{{ "/" | absURL }}">🏠 হোম</a> > {{ .Title }}
</div>

<h1 class="main-title">{{ .Title }}</h1>

<div class="posts-list">
    {{ range .RegularPages }}
    <div class="post-item">
        <div class="post-title">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </div>
        <p class="post-snippet">{{ .Summary | plainify | truncate 150 }}</p>
        <div class="post-meta">
            {{ .PublishDate.Format "02 Jan 2006" }} | {{ .ReadingTime }} মিনিট পড়া
        </div>
    </div>
    {{ end }}
</div>

{{ partial "pagination.html" . }}
{{ end }}
