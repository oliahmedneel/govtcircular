<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang  }}" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    {{ block "extra_head" . }}{{ end }}
</head>
<body>
    <div class="container">
        <!-- JS Logo / Title Link -->
        <a href="{{ "/" | absURL }}" class="site-title-link">JS {{ .Site.Title }}</a>

        <!-- First Navigation Row -->
        <nav class="nav-row">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | absURL }}" class="nav-item">
                {{ .Name }}
            </a>
            {{ end }}
        </nav>

        <!-- Repeated Navigation Row (as per screenshot) -->
        <nav class="nav-row">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | absURL }}" class="nav-item">
                {{ .Name }}
            </a>
            {{ end }}
        </nav>

        <main>
            {{ block "main" . }}{{ end }}
        </main>

        <footer class="footer">
            <p>{{ .Site.Params.copyright }}</p>
            <p>পাওয়ার্ড বাই <a href="https://gohugo.io" target="_blank">Hugo</a></p>
        </footer>
    </div>

    {{ block "extra_scripts" . }}{{ end }}
</body>
</html>
