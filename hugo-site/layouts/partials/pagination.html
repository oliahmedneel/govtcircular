{{ if gt .Paginator.TotalPages 1 }}
<div class="pagination" style="margin-top: 20px; display: flex; gap: 10px;">
    {{ if .Paginator.HasPrev }}
    <a href="{{ .Paginator.Prev.URL }}">← পূর্ববর্তী</a>
    {{ end }}

    {{ range .Paginator.Pagers }}
    <a href="{{ .URL }}" style="{{ if eq .PageNumber $.Paginator.PageNumber }}font-weight: bold; text-decoration: underline;{{ end }}">
        {{ .PageNumber }}
    </a>
    {{ end }}

    {{ if .Paginator.HasNext }}
    <a href="{{ .Paginator.Next.URL }}">পরবর্তী →</a>
    {{ end }}
</div>
{{ end }}
